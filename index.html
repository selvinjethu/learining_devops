<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Nginx App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
            color: #333;
        }
        .container {
            margin-top: 100px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        h1 {
            color: #4facfe;
        }
        button {
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #007bff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome 🚀</h1>
    <p>Raji's Nginx server is working!</p>
    <button onclick="showMessage()">Click Me</button>
    <p id="msg"></p>
</div>

<script>
    function showMessage() {
        document.getElementById("msg").innerText = "Nginx is serving this page successfully!";
    }
</script>

</body>
</html>
